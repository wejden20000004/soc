# Phase 5 — reverse proxy. See "Phase 5" in soc-in-a-box-docker-migration-plan-windows.md.
#
# File provider ONLY (traefik/dynamic/routes.yml). The Docker provider — and with it
# the socket mount — is removed: the old //./pipe/docker_engine mount was the Windows
# named pipe, which Linux containers under WSL2 cannot use, and static routes to four
# known services don't need container discovery anyway. Less config, smaller attack
# surface.
#
# Before first start:
#   1. Generate the self-signed wildcard cert for *.soc.local into traefik/certs/
#      (see traefik/certs/README.md).
#   2. Confirm nothing on Windows holds 443:  netstat -ano | findstr :443

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.websecure.address=:443
    ports:
      - "443:443"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/etc/traefik/certs:ro
    networks: [soc-backend]
    mem_limit: 256m

networks:
  soc-backend:
    external: true
