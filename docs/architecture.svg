<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 980" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="980" fill="#ffffff"/>

  <text x="650" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SOC in a Box — Windows Host Architecture</text>
  <text x="650" y="56" text-anchor="middle" font-size="13" fill="#475569">Everything containerizable runs in Docker Desktop (WSL2); network sniffing runs natively on Windows</text>

  <!-- Windows Host outer -->
  <rect x="30" y="80" width="800" height="830" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="50" y="110" font-size="16" font-weight="700" fill="#0f172a">Windows 11 Host — 192.168.105.100</text>

  <text x="50" y="136" font-size="11.5" font-weight="700" fill="#92400e" letter-spacing="0.5">NATIVE WINDOWS SERVICES (no containers — Phase 2b)</text>

  <!-- Suricata -->
  <rect x="50" y="150" width="360" height="112" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="70" y="176" font-size="14" font-weight="700" fill="#78350f">Suricata</text>
  <text x="70" y="196" font-size="11" fill="#78350f">Npcap capture driver</text>
  <text x="70" y="214" font-size="11" fill="#78350f">sniffs VMnet8 (VMware NAT adapter)</text>
  <text x="70" y="232" font-size="11" fill="#78350f">writes eve.json</text>

  <!-- Filebeat -->
  <rect x="440" y="150" width="360" height="112" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="460" y="176" font-size="14" font-weight="700" fill="#78350f">Elastic Agent / Filebeat</text>
  <text x="460" y="196" font-size="11" fill="#78350f">native Windows service</text>
  <text x="460" y="214" font-size="11" fill="#78350f">tails eve.json (Suricata module)</text>
  <text x="460" y="232" font-size="11" fill="#78350f">ships → localhost:5044 (Beats/TCP)</text>

  <!-- Docker Desktop outer -->
  <rect x="50" y="290" width="760" height="600" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="70" y="318" font-size="15" font-weight="700" fill="#1e3a8a">Docker Desktop (WSL2) — soc-backend network</text>

  <!-- Traefik -->
  <rect x="70" y="334" width="720" height="66" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="90" y="358" font-size="13.5" font-weight="700" fill="#1e3a8a">traefik  (compose.traefik.yml)</text>
  <text x="90" y="378" font-size="11" fill="#1e3a8a">443 → kibana / misp / hive / n8n .soc.local  (self-signed *.soc.local cert)</text>

  <!-- SIEM -->
  <rect x="70" y="422" width="345" height="112" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="90" y="448" font-size="13.5" font-weight="700" fill="#14532d">SIEM  (compose.siem.yml)</text>
  <text x="90" y="468" font-size="11" fill="#14532d">elasticsearch · logstash :5044</text>
  <text x="90" y="486" font-size="11" fill="#14532d">kibana · fleet-server :8220</text>
  <text x="90" y="504" font-size="10.5" fill="#166534" font-style="italic">complete</text>

  <!-- Automation -->
  <rect x="435" y="422" width="345" height="112" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
  <text x="455" y="448" font-size="13.5" font-weight="700" fill="#7c2d12">Automation  (compose.automation.yml)</text>
  <text x="455" y="468" font-size="11" fill="#7c2d12">n8n — workflows, score&gt;55 → ticket</text>
  <text x="455" y="486" font-size="11" fill="#7c2d12">ollama — llama3.2 scoring</text>
  <text x="455" y="504" font-size="10.5" fill="#9a3412" font-style="italic">complete</text>

  <!-- MISP -->
  <rect x="70" y="552" width="345" height="112" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="90" y="578" font-size="13.5" font-weight="700" fill="#831843">MISP  (compose.misp.yml)</text>
  <text x="90" y="598" font-size="11" fill="#831843">misp-core · misp-modules</text>
  <text x="90" y="616" font-size="11" fill="#831843">mariadb · redis</text>
  <text x="90" y="634" font-size="10.5" fill="#9d174d" font-style="italic">stub — TODO</text>

  <!-- TheHive -->
  <rect x="435" y="552" width="345" height="112" rx="8" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="455" y="578" font-size="13.5" font-weight="700" fill="#4c1d95">TheHive  (compose.thehive.yml)</text>
  <text x="455" y="598" font-size="11" fill="#4c1d95">thehive · cassandra</text>
  <text x="455" y="616" font-size="11" fill="#4c1d95">es-thehive · minio (+ optional Cortex)</text>
  <text x="455" y="634" font-size="10.5" fill="#5b21b6" font-style="italic">stub — TODO</text>

  <!-- Volumes note -->
  <rect x="70" y="684" width="710" height="56" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="90" y="706" font-size="11.5" fill="#334155" font-weight="700">All databases (ES ×2, Cassandra, MariaDB, MinIO, Ollama models) on named Docker volumes</text>
  <text x="90" y="724" font-size="11" fill="#334155">— never bind-mounted to C:\ paths (5–10× I/O penalty across the WSL2 boundary)</text>

  <!-- VMware Workstation -->
  <rect x="860" y="150" width="380" height="230" rx="12" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="880" y="178" font-size="15" font-weight="700" fill="#0f172a">VMware Workstation</text>
  <rect x="880" y="195" width="340" height="165" rx="8" fill="#ffffff" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="900" y="220" font-size="13.5" font-weight="700" fill="#0f172a">Windows 10 Endpoint VM</text>
  <text x="900" y="240" font-size="11" fill="#334155">Sysmon (Event ID 1/3)</text>
  <text x="900" y="258" font-size="11" fill="#334155">Elastic Agent</text>
  <text x="900" y="276" font-size="11" fill="#334155">192.168.105.x (VMnet8 NAT)</text>
  <text x="900" y="296" font-size="11" fill="#334155">enrolls → https://192.168.105.100:8220</text>
  <text x="900" y="316" font-size="11" fill="#334155">the one VM left after migration</text>

  <!-- Arrows -->
  <path d="M 410 200 C 600 170, 700 200, 858 235" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="520" y="150" width="290" height="20" fill="#ffffff" opacity="0.85"/>
  <text x="665" y="165" text-anchor="middle" font-size="11" fill="#1e293b">sniffs VMnet8 (VM↔host, VM↔internet)</text>

  <path d="M 600 262 C 500 320, 350 360, 250 420" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="320" width="220" height="20" fill="#ffffff" opacity="0.85"/>
  <text x="400" y="335" text-anchor="middle" font-size="11" fill="#1e293b">ships eve.json → :5044</text>

  <path d="M 1030 380 C 950 430, 700 440, 417 470" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="640" y="405" width="290" height="20" fill="#ffffff" opacity="0.85"/>
  <text x="785" y="420" text-anchor="middle" font-size="11" fill="#1e293b">Elastic Agent enroll → :8220 (TLS)</text>

  <!-- Legend -->
  <g font-size="11.5" fill="#334155">
    <rect x="70" y="900" width="16" height="16" rx="3" fill="#fef3c7" stroke="#b45309"/>
    <text x="94" y="913">Native Windows service</text>

    <rect x="290" y="900" width="16" height="16" rx="3" fill="#dbeafe" stroke="#1d4ed8"/>
    <text x="314" y="913">Docker container group</text>

    <rect x="520" y="900" width="16" height="16" rx="3" fill="#f1f5f9" stroke="#334155"/>
    <text x="544" y="913">VMware VM</text>

    <text x="70" y="936" font-style="italic" fill="#64748b">"complete" / "stub — TODO" reflects compose file status; see CLAUDE.md.</text>
  </g>
</svg>
