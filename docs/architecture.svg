<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 1100" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1450" height="1100" fill="#ffffff"/>

  <text x="725" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SOC in a Box — UML Deployment Diagram</text>
  <text x="725" y="53" text-anchor="middle" font-size="13" fill="#475569">Windows Host Edition — devices, execution environments, and deployed artifacts</text>

  <!-- ============ WINDOWS 11 HOST (device cube) ============ -->
  <!-- side + top faces -->
  <polygon points="910,130 928,112 928,932 910,950" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <polygon points="50,130 68,112 928,112 910,130" fill="#eef2f7" stroke="#334155" stroke-width="2"/>
  <!-- front face -->
  <rect x="50" y="130" width="860" height="820" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="70" y="158" font-size="12" font-style="italic" fill="#475569">«device»</text>
  <text x="70" y="180" font-size="16" font-weight="700" fill="#0f172a">Windows 11 Host</text>
  <text x="70" y="198" font-size="11" fill="#475569">192.168.105.100</text>

  <!-- Suricata artifact -->
  <rect x="90" y="230" width="380" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <polygon points="458,230 470,230 470,242" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <text x="110" y="252" font-size="10.5" font-style="italic" fill="#78350f">«artifact»</text>
  <text x="110" y="271" font-size="13.5" font-weight="700" fill="#78350f">Suricata</text>
  <text x="110" y="289" font-size="10.5" fill="#78350f">Npcap capture · sniffs VMnet8</text>
  <text x="110" y="305" font-size="10.5" fill="#78350f">writes eve.json — no container</text>

  <!-- Filebeat artifact -->
  <rect x="500" y="230" width="380" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <polygon points="868,230 880,230 880,242" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <text x="520" y="252" font-size="10.5" font-style="italic" fill="#78350f">«artifact»</text>
  <text x="520" y="271" font-size="13.5" font-weight="700" fill="#78350f">Elastic Agent / Filebeat</text>
  <text x="520" y="289" font-size="10.5" fill="#78350f">tails eve.json (Suricata module)</text>
  <text x="520" y="305" font-size="10.5" fill="#78350f">native Windows service</text>

  <!-- Docker Desktop execution environment -->
  <rect x="90" y="350" width="800" height="580" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="376" font-size="12" font-style="italic" fill="#1e3a8a">«execution environment»</text>
  <text x="110" y="398" font-size="15" font-weight="700" fill="#1e3a8a">Docker Desktop (WSL2)</text>
  <text x="110" y="414" font-size="10.5" fill="#1e3a8a">soc-backend network</text>

  <!-- Traefik artifact -->
  <rect x="110" y="430" width="760" height="60" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <polygon points="856,430 868,430 868,442" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="130" y="450" font-size="10.5" font-style="italic" fill="#1e3a8a">«artifact»</text>
  <text x="130" y="468" font-size="13.5" font-weight="700" fill="#1e3a8a">traefik  (compose.traefik.yml)</text>
  <text x="330" y="468" font-size="10.5" fill="#1e3a8a">443 → kibana / misp / hive / n8n .soc.local</text>

  <!-- SIEM execution environment -->
  <rect x="110" y="510" width="370" height="150" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="128" y="534" font-size="10.5" font-style="italic" fill="#14532d">«execution environment»</text>
  <text x="128" y="554" font-size="13.5" font-weight="700" fill="#14532d">compose.siem.yml</text>
  <text x="128" y="570" font-size="10.5" font-style="italic" fill="#166534">complete</text>
  <text x="128" y="592" font-size="10.5" fill="#14532d">artifacts: elasticsearch, logstash :5044,</text>
  <text x="128" y="608" font-size="10.5" fill="#14532d">kibana, fleet-server :8220</text>

  <!-- Automation execution environment -->
  <rect x="500" y="510" width="370" height="150" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5"/>
  <text x="518" y="534" font-size="10.5" font-style="italic" fill="#7c2d12">«execution environment»</text>
  <text x="518" y="554" font-size="13.5" font-weight="700" fill="#7c2d12">compose.automation.yml</text>
  <text x="518" y="570" font-size="10.5" font-style="italic" fill="#9a3412">complete</text>
  <text x="518" y="592" font-size="10.5" fill="#7c2d12">artifacts: n8n (score&gt;55 → ticket),</text>
  <text x="518" y="608" font-size="10.5" fill="#7c2d12">ollama (llama3.2)</text>

  <!-- MISP execution environment -->
  <rect x="110" y="676" width="370" height="150" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="128" y="700" font-size="10.5" font-style="italic" fill="#831843">«execution environment»</text>
  <text x="128" y="720" font-size="13.5" font-weight="700" fill="#831843">compose.misp.yml</text>
  <text x="128" y="736" font-size="10.5" font-style="italic" fill="#9d174d">stub — TODO</text>
  <text x="128" y="758" font-size="10.5" fill="#831843">artifacts: misp-core, misp-modules,</text>
  <text x="128" y="774" font-size="10.5" fill="#831843">mariadb, redis</text>

  <!-- TheHive execution environment -->
  <rect x="500" y="676" width="370" height="150" rx="8" fill="#ede9fe" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="518" y="700" font-size="10.5" font-style="italic" fill="#4c1d95">«execution environment»</text>
  <text x="518" y="720" font-size="13.5" font-weight="700" fill="#4c1d95">compose.thehive.yml</text>
  <text x="518" y="736" font-size="10.5" font-style="italic" fill="#5b21b6">stub — TODO</text>
  <text x="518" y="758" font-size="10.5" fill="#4c1d95">artifacts: thehive, cassandra,</text>
  <text x="518" y="774" font-size="10.5" fill="#4c1d95">es-thehive, minio (+ optional Cortex)</text>

  <!-- Volumes note -->
  <rect x="110" y="850" width="760" height="56" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="130" y="872" font-size="11" fill="#334155" font-weight="700">All databases (ES ×2, Cassandra, MariaDB, MinIO, Ollama models) on named Docker volumes</text>
  <text x="130" y="890" font-size="10.5" fill="#334155">— never bind-mounted to C:\ paths (5–10× I/O penalty across the WSL2 boundary)</text>

  <!-- ============ VMWARE WORKSTATION (device cube) ============ -->
  <polygon points="1380,210 1396,194 1396,524 1380,540" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <polygon points="1000,210 1016,194 1396,194 1380,210" fill="#eef2f7" stroke="#334155" stroke-width="2"/>
  <rect x="1000" y="210" width="380" height="330" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="1018" y="236" font-size="12" font-style="italic" fill="#475569">«device»</text>
  <text x="1018" y="258" font-size="15" font-weight="700" fill="#0f172a">VMware Workstation</text>

  <!-- Endpoint VM nested device cube -->
  <polygon points="1355,280 1367,268 1367,498 1355,510" fill="#cbd5e1" stroke="#334155" stroke-width="1.5"/>
  <polygon points="1025,280 1037,268 1367,268 1355,280" fill="#eef2f7" stroke="#334155" stroke-width="1.5"/>
  <rect x="1025" y="280" width="330" height="230" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="1045" y="304" font-size="10.5" font-style="italic" fill="#475569">«device»</text>
  <text x="1045" y="324" font-size="13.5" font-weight="700" fill="#0f172a">Windows 10 Endpoint VM</text>
  <text x="1045" y="340" font-size="10.5" fill="#475569">192.168.105.x (VMnet8 NAT)</text>

  <!-- Sysmon artifact -->
  <rect x="1045" y="352" width="290" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <polygon points="1323,352 1335,352 1335,364" fill="#c7d2fe" stroke="#4338ca" stroke-width="1"/>
  <text x="1060" y="371" font-size="10" font-style="italic" fill="#312e81">«artifact»</text>
  <text x="1060" y="389" font-size="12.5" font-weight="700" fill="#312e81">Sysmon (Event ID 1/3)</text>

  <!-- Elastic Agent artifact -->
  <rect x="1045" y="412" width="290" height="66" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <polygon points="1323,412 1335,412 1335,424" fill="#c7d2fe" stroke="#4338ca" stroke-width="1"/>
  <text x="1060" y="431" font-size="10" font-style="italic" fill="#312e81">«artifact»</text>
  <text x="1060" y="449" font-size="12.5" font-weight="700" fill="#312e81">Elastic Agent</text>
  <text x="1060" y="466" font-size="10" fill="#312e81">enrolls → :8220</text>

  <!-- ============ ANALYST WORKSTATION (device cube) ============ -->
  <polygon points="1380,610 1394,596 1394,766 1380,780" fill="#cbd5e1" stroke="#334155" stroke-width="2"/>
  <polygon points="1000,610 1014,596 1394,596 1380,610" fill="#eef2f7" stroke="#334155" stroke-width="2"/>
  <rect x="1000" y="610" width="380" height="170" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="1018" y="634" font-size="12" font-style="italic" fill="#475569">«device»</text>
  <text x="1018" y="654" font-size="15" font-weight="700" fill="#0f172a">Analyst Workstation</text>

  <rect x="1020" y="668" width="340" height="92" fill="#fefce8" stroke="#a16207" stroke-width="1.5"/>
  <polygon points="1348,668 1360,668 1360,680" fill="#fde68a" stroke="#a16207" stroke-width="1"/>
  <text x="1035" y="688" font-size="10" font-style="italic" fill="#713f12">«artifact»</text>
  <text x="1035" y="706" font-size="12.5" font-weight="700" fill="#713f12">Browser</text>
  <text x="1035" y="723" font-size="10" fill="#713f12">https://{kibana,misp,hive,n8n}.soc.local</text>
  <text x="1035" y="739" font-size="10" fill="#713f12">(hosts file → 127.0.0.1)</text>

  <!-- ============ COMMUNICATION PATHS ============ -->
  <path d="M 470 280 C 700 260, 900 300, 1023 400" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="620" y="240" width="270" height="34" fill="#ffffff" opacity="0.9"/>
  <text x="755" y="253" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1e293b">«flow»</text>
  <text x="755" y="267" text-anchor="middle" font-size="10.5" fill="#1e293b">sniffs VMnet8 (VM↔host, VM↔internet)</text>

  <path d="M 690 330 C 550 400, 400 440, 300 508" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="470" y="392" width="180" height="34" fill="#ffffff" opacity="0.9"/>
  <text x="560" y="405" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1e293b">«TCP»</text>
  <text x="560" y="419" text-anchor="middle" font-size="10.5" fill="#1e293b">eve.json → :5044</text>

  <path d="M 1045 452 C 850 480, 650 500, 483 520" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="470" width="220" height="34" fill="#ffffff" opacity="0.9"/>
  <text x="810" y="483" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1e293b">«TCP/TLS»</text>
  <text x="810" y="497" text-anchor="middle" font-size="10.5" fill="#1e293b">enroll → :8220</text>

  <path d="M 1020 715 C 950 640, 950 500, 872 460" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="895" y="560" width="150" height="34" fill="#ffffff" opacity="0.9"/>
  <text x="970" y="573" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1e293b">«HTTPS»</text>
  <text x="970" y="587" text-anchor="middle" font-size="10.5" fill="#1e293b">:443</text>

  <!-- ============ LEGEND ============ -->
  <g font-size="11" fill="#334155">
    <polygon points="70,1000 78,993 118,993 110,1000" fill="#eef2f7" stroke="#334155" stroke-width="1"/>
    <rect x="70" y="1000" width="40" height="24" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
    <text x="122" y="1017">«device» — physical / virtual host</text>

    <rect x="380" y="1000" width="40" height="24" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="432" y="1017">«execution environment» — OS / runtime container</text>

    <rect x="800" y="1000" width="40" height="24" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <polygon points="832,1000 840,1000 840,1008" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
    <text x="852" y="1017">«artifact» — deployed unit</text>

    <line x1="1090" y1="1012" x2="1140" y2="1012" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="1150" y="1017">communication path</text>
  </g>
</svg>
