# Suricata eve.json pipeline.
# Design decision: native Windows Filebeat ships RAW eve.json lines over a plain
# filestream input (NOT the Filebeat "suricata module" — the module's parsing lives
# in ES ingest pipelines that only install when Filebeat talks to ES directly, so
# routing module output through Logstash would silently skip it). All parsing
# happens here instead.
#
# ${ES_PASSWORD} resolves from the Logstash CONTAINER environment — compose.siem.yml
# must pass it in the service's `environment:` block (it does).

input {
  beats {
    port => 5044
  }
}

filter {
  # Each beat event carries one eve.json line in [message]; explode it to root fields.
  json {
    source => "message"
    remove_field => ["message"]
  }

  # Use Suricata's own timestamp as the event time.
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Minimal ECS mapping so the n8n workflow query (event.kind:alert) and Kibana
  # filters work the same way they did on Security Onion.
  if [event_type] == "alert" {
    mutate {
      add_field => {
        "[event][kind]"     => "alert"
        "[event][module]"   => "suricata"
        "[event][dataset]"  => "suricata.alert"
      }
    }
    if [alert][signature] {
      mutate { add_field => { "[rule][name]" => "%{[alert][signature]}" } }
    }
    if [alert][severity] {
      mutate { add_field => { "[event][severity]" => "%{[alert][severity]}" } }
    }
  } else {
    mutate {
      add_field => {
        "[event][kind]"    => "event"
        "[event][module]"  => "suricata"
        "[event][dataset]" => "suricata.%{event_type}"
      }
    }
  }

  if [src_ip] {
    mutate { add_field => { "[source][ip]" => "%{src_ip}" } }
  }
  if [dest_ip] {
    mutate { add_field => { "[destination][ip]" => "%{dest_ip}" } }
  }
  if [src_port] {
    mutate { add_field => { "[source][port]" => "%{src_port}" } }
  }
  if [dest_port] {
    mutate { add_field => { "[destination][port]" => "%{dest_port}" } }
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ES_PASSWORD}"
    index    => "suricata-%{+YYYY.MM.dd}"
  }
}
